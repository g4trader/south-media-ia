<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Footfall - {{CLIENT_NAME}} - {{CAMPAIGN_NAME}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{--bg:#0F1023;--bg2:#16213E;--panel:#1A1A2E;--muted:#9CA3AF;--stroke:rgba(139,92,246,.28);--grad:linear-gradient(135deg,#8B5CF6,#EC4899);--orange:#f97316}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#fff;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 50%,var(--panel) 100%)}
  .container{max-width:1320px;margin:0 auto;padding:28px}
  .card{background:rgba(26,26,46,.8);border:1px solid var(--stroke);border-radius:14px;padding:18px;margin-bottom:20px;backdrop-filter:blur(8px)}
  .header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
  .title{font-size:1.45rem;font-weight:800}
  .subtitle{color:var(--muted);margin-top:4px}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid rgba(249,115,22,.55);color:var(--orange);font-weight:700;font-size:.78rem}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:1000px){.metrics{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:640px){.metrics{grid-template-columns:1fr}}
  .metric{background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.18);border-radius:12px;padding:14px}
  .metric .label{display:block;color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.05em}
  .metric .value{display:block;font-size:1.55rem;font-weight:800;margin-top:4px;line-height:1.15}
  .grid{display:grid;grid-template-columns:2fr 1fr;gap:14px}
  @media(max-width:980px){.grid{grid-template-columns:1fr}}
  .table-wrap{overflow:auto}
  table{width:100%;border-collapse:collapse}
  thead th{color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:.74rem;text-align:left;padding:10px;border-bottom:1px solid rgba(148,163,184,.22)}
  tbody td{padding:10px;border-bottom:1px solid rgba(148,163,184,.14);font-size:.9rem}
  .error{color:#fca5a5}
</style>
</head>
<body>
  <div class="container">
    <section class="card">
      <div class="header">
        <div>
          <div class="title">{{CLIENT_NAME}} - {{CAMPAIGN_NAME}}</div>
          <div class="subtitle">Template Footfall | {{PRIMARY_CHANNEL}}</div>
        </div>
        <span class="badge">FOOTFALL</span>
      </div>
    </section>

    <section class="card">
      <div class="metrics" id="metrics"></div>
    </section>

    <section class="grid">
      <section class="card">
        <h3 style="margin-bottom:10px">Evolução Diária de Cliques</h3>
        <canvas id="dailyClicksChart" height="110"></canvas>
      </section>
      <section class="card">
        <h3 style="margin-bottom:10px">Pacing Orçamentário</h3>
        <canvas id="budgetPacingChart" height="110"></canvas>
      </section>
    </section>

    <section class="card">
      <h3 style="margin-bottom:10px">Resumo por Canal</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Canal</th>
              <th>Impressões</th>
              <th>Cliques</th>
              <th>CTR</th>
              <th>Gasto</th>
            </tr>
          </thead>
          <tbody id="channelRows"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h3 style="margin-bottom:8px">Insights</h3>
      <ul id="insightsList" style="padding-left:20px;line-height:1.6"></ul>
    </section>
  </div>

<script>
const campaignKey = "{{CAMPAIGN_KEY_PLACEHOLDER}}";

function asNumber(value){
  if (value === null || value === undefined) return 0;
  if (typeof value === "number") return Number.isFinite(value) ? value : 0;
  const raw = String(value).replace("R$","").replace(/\s+/g,"").replace(/\./g,"").replace(",",".");
  const num = Number(raw);
  return Number.isFinite(num) ? num : 0;
}

function fmtCurrency(v){
  return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(asNumber(v));
}
function fmtInt(v){
  return new Intl.NumberFormat("pt-BR").format(Math.round(asNumber(v)));
}
function fmtPct(v){
  return `${asNumber(v).toFixed(2)}%`;
}

async function loadData(){
  if (window.EMBEDDED_CAMPAIGN_DATA) return window.EMBEDDED_CAMPAIGN_DATA;
  const res = await fetch(`/api/${campaignKey}/data`);
  const json = await res.json();
  if (!json.success) throw new Error(json.message || "Falha ao carregar dados");
  return json.data;
}

function renderMetrics(data){
  const summary = data.campaign_summary || {};
  const contract = data.contract || {};
  const spend = asNumber(summary.total_spend);
  const investment = asNumber(contract.investment);
  const pacing = investment > 0 ? (spend / investment) * 100 : 0;
  const ctr = asNumber(summary.ctr);

  const metrics = [
    ["Budget Contratado", fmtCurrency(investment)],
    ["Budget Utilizado", fmtCurrency(spend)],
    ["Pacing", fmtPct(pacing)],
    ["Impressões", fmtInt(summary.total_impressions)],
    ["Cliques", fmtInt(summary.total_clicks)],
    ["CTR", fmtPct(ctr)],
    ["VC", fmtInt(summary.total_video_completions)],
    ["CPM", fmtCurrency(summary.cpm)]
  ];

  const html = metrics.map(([label, value]) => (
    `<article class="metric"><span class="label">${label}</span><span class="value">${value}</span></article>`
  )).join("");
  document.getElementById("metrics").innerHTML = html;
}

function renderChannels(data){
  const channels = Array.isArray(data.publishers) ? data.publishers : [];
  const rows = channels.slice(0, 25).map((ch) => `
    <tr>
      <td>${ch.publisher || ch.name || ch.channel || "-"}</td>
      <td>${fmtInt(ch.impressions)}</td>
      <td>${fmtInt(ch.clicks)}</td>
      <td>${fmtPct(ch.ctr)}</td>
      <td>${fmtCurrency(ch.spend)}</td>
    </tr>
  `).join("");
  document.getElementById("channelRows").innerHTML = rows || `<tr><td colspan="5" class="error">Sem dados de canal/publisher</td></tr>`;
}

function renderCharts(data){
  const daily = Array.isArray(data.daily_data) ? data.daily_data : [];
  const byDate = {};
  for (const row of daily){
    const d = row.date || row.data || "";
    if (!d) continue;
    if (!byDate[d]) byDate[d] = {clicks:0, spend:0};
    byDate[d].clicks += asNumber(row.clicks);
    byDate[d].spend += asNumber(row.spend);
  }
  const labels = Object.keys(byDate).sort((a,b)=>{
    const da = a.split("/").reverse().join("-");
    const db = b.split("/").reverse().join("-");
    return da.localeCompare(db);
  });
  const clicks = labels.map((d)=>byDate[d].clicks);

  new Chart(document.getElementById("dailyClicksChart"),{
    type:"line",
    data:{labels,datasets:[{label:"Cliques",data:clicks,borderColor:"#f97316",backgroundColor:"rgba(249,115,22,.18)",tension:.3,fill:true}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}
  });

  const summary = data.campaign_summary || {};
  const contract = data.contract || {};
  const spend = asNumber(summary.total_spend);
  const investment = asNumber(contract.investment);
  new Chart(document.getElementById("budgetPacingChart"),{
    type:"bar",
    data:{labels:["Budget"],datasets:[{label:"Contratado",data:[investment],backgroundColor:"rgba(139,92,246,.45)"},{label:"Utilizado",data:[spend],backgroundColor:"rgba(249,115,22,.65)"}]},
    options:{plugins:{legend:{position:"bottom"}},scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}}
  });
}

function renderInsights(data){
  const summary = data.campaign_summary || {};
  const contract = data.contract || {};
  const spend = asNumber(summary.total_spend);
  const investment = asNumber(contract.investment);
  const pacing = investment > 0 ? (spend / investment) * 100 : 0;
  const ctr = asNumber(summary.ctr);
  const insights = [
    `Pacing financeiro em <b>${fmtPct(pacing)}</b>.`,
    `CTR consolidado de <b>${fmtPct(ctr)}</b>.`,
    `Investimento utilizado: <b>${fmtCurrency(spend)}</b> de <b>${fmtCurrency(investment)}</b>.`
  ];
  document.getElementById("insightsList").innerHTML = insights.map((i)=>`<li>${i}</li>`).join("");
}

(async function boot(){
  try{
    const data = await loadData();
    renderMetrics(data);
    renderChannels(data);
    renderCharts(data);
    renderInsights(data);
  }catch(err){
    document.getElementById("insightsList").innerHTML = `<li class="error">${err.message}</li>`;
  }
})();
</script>
</body>
</html>
